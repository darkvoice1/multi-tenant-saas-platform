services:
  db:
    image: postgres:16
    container_name: saas_platform_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_platform
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    image: m.daocloud.io/docker.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: saas_platform_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: saas_platform_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  prometheus:
    image: m.daocloud.io/docker.io/prom/prometheus:v2.54.1
    container_name: saas_platform_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: m.daocloud.io/docker.io/grafana/grafana:11.5.2
    container_name: saas_platform_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: saas_platform_jaeger
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  db_data:
  minio_data:
  redis_data:
  grafana_data:
