name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Go test with coverage gate
        working-directory: backend
        shell: pwsh
        run: ./scripts/coverage.ps1 -MinCoverage 20

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_platform
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/saas_platform?sslmode=disable
        run: go test ./internal/db -tags=integration -count=1

  e2e:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - integration
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_platform
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/saas_platform?sslmode=disable
          JWT_SECRET: dev_change_me
          ENV: dev
          STORAGE_BACKEND: local
          STORAGE_DIR: storage
        run: |
          nohup go run ./cmd/api > /tmp/api.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/healthz > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "backend not ready"
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run dev -- --host 0.0.0.0 --port 5173 > /tmp/web.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "frontend not ready"
          exit 1

      - name: Run Playwright in Docker
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}:/work \
            -w /work/e2e \
            mcr.microsoft.com/playwright:v1.50.0-jammy \
            bash -lc "npm install --no-audit --no-fund && npx playwright test"
